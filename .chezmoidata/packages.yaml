# Declarative package lists by profile + distro + compositor.
#
# Profiles:
#   minimal     — core CLI only
#   workstation — minimal + desktop (compositor choice) + flatpak + k8s
#
# Compositors (workstation only): niri | hyprland | both
#
# Distros: arch, ubuntu (25.10 questing only)
#
# mise-managed tools live in dot_config/mise/config.toml.
# Flatpaks listed here (cross-distro).
# AUR (Arch-only) packages listed under .aur sub-keys.

packages:
  minimal:
    common:
      - zsh
      - git
      - tmux
      - curl
      - wget
      - unzip
      - fzf
      - ripgrep
      - zoxide
      - fontconfig

    ubuntu:
      - build-essential
      - software-properties-common
      - fd-find          # symlinked to `fd` by post-script
      - xclip
      - python3-pip

    arch:
      - base-devel
      - fd
      - xclip
      - python-pip

  workstation:
    # Desktop base — shared by both niri and hyprland sessions.
    # NOTE: ghostty is installed separately (snap on ubuntu, pacman on arch)
    # by run_before_05-install-packages.sh — no clean apt source on questing.
    common:
      - loupe
      - gnome-text-editor
      - file-roller
      - seahorse
      - mpv
      - flatpak
      - tree
      - btop
      - iotop
      - nethogs
      - sshfs
      # Wayland desktop bits used by both compositors
      - waybar
      - cliphist
      - wl-clipboard
      - brightnessctl
      - playerctl
      - udiskie
      - blueman
      - pavucontrol
      - grim
      - slurp
      - nautilus
      - qt5ct
      - qt6ct
      - xdg-user-dirs
      - xdg-desktop-portal-gtk
      - gvfs
      - tumbler
      - accountsservice   # required by DMS for profile pictures
      # DMS optional companions
      - dgop
      - matugen
      - i2c-tools
      - cava

    ubuntu:
      - gnome-firmware
      - dms
      - sway-notification-center
      - rofi
      - wlogout
      - network-manager-gnome

    arch:
      - gnome-firmware
      - reflector
      - pkgfile
      - pacman-contrib
      - gnome-keyring
      - jack2
      - rate-mirrors
      - paru             # AUR helper
      - dms-shell
      - ghostty
      - rofi-wayland
      - wlogout
      - network-manager-applet
      - qt6-multimedia

    # Niri compositor stack (installed when compositor=niri|both)
    niri:
      common:
        - xwayland-satellite
      ubuntu:
        - niri
      arch:
        - niri

    # Hyprland compositor stack (installed when compositor=hyprland|both)
    # Ubuntu requires ppa:cppiber/hyprland (added by install-packages script).
    hyprland:
      common:
        - hyprlock
        - hypridle
        - hyprpaper
        - hyprsunset
      ubuntu:
        - hyprland
        - xdg-desktop-portal-hyprland
      arch:
        - hyprland
        - xdg-desktop-portal-hyprland
      # AUR (Arch only)
      aur:
        - hyprpolkitagent-git
        - grimblast-git
        - hyprshot

    # AUR packages independent of compositor choice (Arch only)
    aur:
      - swaync
      - rofi-calc

    flatpak:
      - com.spotify.Client
      - com.discordapp.Discord
      - md.obsidian.Obsidian
      - com.bitwarden.desktop
      - io.dbeaver.DBeaverCommunity
      - org.gimp.GIMP
      - com.jgraph.drawio.desktop
