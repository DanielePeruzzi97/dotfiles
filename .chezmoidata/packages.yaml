# Declarative package lists by profile + distro.
#
# Profiles:
#   minimal     — core CLI only
#   workstation — minimal + desktop (niri+hyprland+DMS) + flatpak + k8s
#
# Distros: arch, ubuntu (25.10 questing only)
#
# mise-managed tools live in dot_config/mise/config.toml.
# Flatpaks listed here (cross-distro).
# AUR (Arch-only) packages listed under aur:

packages:
  minimal:
    common:
      - zsh
      - git
      - tmux
      - curl
      - wget
      - unzip
      - fzf
      - ripgrep
      - zoxide
      - fontconfig

    ubuntu:
      - build-essential
      - software-properties-common
      - fd-find          # symlinked to `fd` by post-script
      - xclip
      - python3-pip

    arch:
      - base-devel
      - fd
      - xclip
      - python-pip

  workstation:
    # Desktop core (niri + hyprland coexist; GDM picks session at login)
    common:
      - loupe
      - gnome-text-editor
      - file-roller
      - seahorse
      - mpv
      - flatpak
      - tree
      - btop
      - iotop
      - nethogs
      - sshfs
      # Wayland desktop bits used by both niri & hyprland
      - waybar
      - cliphist
      - wl-clipboard
      - brightnessctl
      - playerctl
      - udiskie
      - blueman
      - pavucontrol
      - grim
      - slurp
      - nautilus
      - qt5ct
      - qt6ct
      - xdg-user-dirs
      - xdg-desktop-portal-gtk
      - gvfs
      - tumbler
      - accountsservice   # required by DMS for profile pictures
      # DMS optional companions
      - dgop
      - matugen
      - i2c-tools
      - cava
      # Hyprland-specific (Ubuntu: via ppa:cppiber/hyprland)
      - hyprlock
      - hypridle
      - hyprpaper
      - hyprsunset
      # Niri-specific
      - xwayland-satellite

    ubuntu:
      - gnome-firmware
      - niri
      - dms
      - hyprland
      - xdg-desktop-portal-hyprland
      - sway-notification-center
      - rofi
      - wlogout
      - network-manager-gnome

    arch:
      - gnome-firmware
      - reflector
      - pkgfile
      - pacman-contrib
      - gnome-keyring
      - jack2
      - rate-mirrors
      - paru             # AUR helper
      - niri
      - dms-shell
      - hyprland
      - xdg-desktop-portal-hyprland
      - rofi-wayland
      - wlogout
      - network-manager-applet
      - qt6-multimedia

    # AUR packages (Arch only)
    aur:
      - hyprpolkitagent-git
      - swaync
      - grimblast-git
      - hyprshot
      - rofi-calc

    flatpak:
      - com.spotify.Client
      - com.discordapp.Discord
      - md.obsidian.Obsidian
      - com.bitwarden.desktop
      - io.dbeaver.DBeaverCommunity
      - org.gimp.GIMP
      - com.jgraph.drawio.desktop
