---
# Declarative package lists by profile + distro.
#
# Profiles:
#   minimal     — core CLI only
#   workstation — minimal + desktop (niri + DMS) + flatpak + k8s
#
# Distros: arch, ubuntu (25.10 questing only)
#
# Convention:
#   common.* — installed on every distro
#   <distro>.* — distro-specific additions (or items NOT installed on the
#                other distro because the other distro ships them by default)
#   aur — Arch-only AUR packages (installed via paru)
#
# External apt sources / one-off downloads (chrome, vscode, anydesk, teams,
# nvim appimage, heidisql, wally) are handled by
# .chezmoiscripts/run_before_05-install-packages.sh.tmpl.
#
# mise-managed tools live in dot_config/mise/config.toml.

packages:
  minimal:
    common:
      - zsh
      - git
      - tmux
      - curl
      - wget
      - unzip
      - fzf
      - ripgrep
      - zoxide
      - eza
      - fontconfig
      - age # secrets encryption for chezmoi (private repo)

    ubuntu:
      - build-essential
      - software-properties-common
      - fd-find # symlinked to `fd` by post-script
      - wl-clipboard        # wl-copy/wl-paste for neovim/tmux clipboard on Wayland
      - python3-pip
      - pipx # for ansible install

    arch:
      - base-devel
      - fd
      - wl-clipboard        # wl-copy/wl-paste for neovim/tmux clipboard on Wayland
      - python-pip
      - python-pipx
      - neovim # ubuntu uses appimage v0.12.2 (managed by install script)

  workstation:
    # Desktop base — niri + DMS session.
    # DMS manages: bar, notifications, theming (matugen), session menu.
    # NOTE: ghostty is installed separately by run_before_05-install-packages.sh
    # (mkasberg installer on ubuntu, pacman on arch — no clean apt source on questing).
    common:
      - mpv
      - flatpak
      - tree
      - btop
      - iotop
      - khal              # calendar (DMS optional feature)
      # - nethogs
      # - sshfs
      # Wayland desktop
      - udiskie             # auto-mount USB drives (no DMS equivalent)
      - blueman             # BT manager GUI for pairing/profiles (DMS has basic toggle only)
      - pavucontrol         # advanced audio routing (DMS has simple slider only)
      # - cliphist          # not needed — DMS has native clipboard history
      # - brightnessctl     # replaced by dms ipc call brightness
      # - playerctl         # replaced by dms ipc call mpris
      # - grim
      # - slurp
      # - xdg-user-dirs
      # - xdg-desktop-portal-gtk
      # - gvfs
      # - tumbler
      # DMS dependencies
      # - matugen
      # - i2c-tools
      # - cava
      # Apps
      - remmina
      - gnome-boxes
      - piper
      - filezilla

    ubuntu:
      # - gnome-firmware
      - rofi
      - network-manager-gnome  # nm-applet tray + nm-connection-editor for VPN config
      # Qt image formats for DMS (kimageformats)
      - qt6-image-formats-plugins
      # YubiKey
      - yubikey-manager
      - yubikey-manager-qt
      - libyubikey-udev
      - pcscd

    arch:
      # GNOME basics that Ubuntu pre-installs but Arch doesn't
      - loupe
      - gnome-text-editor
      - file-roller
      - nautilus
      - seahorse
      - accountsservice
      - firefox
      - gnome-firmware
      - reflector
      - pkgfile
      - pacman-contrib
      - gnome-keyring
      - jack2
      - rate-mirrors
      - paru # AUR helper
      - ghostty
      - rofi-wayland
      - network-manager-applet
      - qt6-multimedia
      # Qt image formats for DMS (kimageformats)
      - qt6-imageformats
      # Apps
      - google-chrome # via paru → AUR
      - code # vscode-oss (community) — for closed source use AUR `visual-studio-code-bin`
      - heidisql # AUR
      - anydesk-bin # AUR
      # Cloud / DevOps
      - docker
      - docker-compose
      - ansible
      - uv # ubuntu installs via Astral script in install script
      # YubiKey
      - yubikey-manager
      - ccid
      - libusb-compat
      - pcsclite

    # Niri compositor stack + DMS shell
    # DMS is the niri shell (bar + notifications + launcher + lock)
    niri:
      common:
        - xwayland-satellite
      ubuntu:
        - niri
        - dms
      arch:
        - niri
        - dms-shell

    # AUR packages (Arch only)
    aur:
      - rofi-calc
      - teams-for-linux-bin
      - wally
      - yubikey-manager-qt # deprecated upstream, AUR only
      - bitwarden-cli # bw CLI for age key bootstrap (personal machines)
      - adw-gtk3 # GTK3 theme for DMS/matugen theming

    flatpak:
      - com.spotify.Client
      - com.discordapp.Discord
      - md.obsidian.Obsidian
      - com.bitwarden.desktop
      - org.gimp.GIMP
      - com.jgraph.drawio.desktop
      # GTK3 theme for flatpak apps (DMS/matugen theming)
      # - org.gtk.Gtk3theme.adw-gtk3
      # - org.gtk.Gtk3theme.adw-gtk3-dark
