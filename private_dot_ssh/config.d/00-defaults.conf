# Default SSH settings for all connections
Host *
  ServerAliveInterval 60
  ServerAliveCountMax 3
  TCPKeepAlive yes
  Compression yes
  
  # Security settings
  AddKeysToAgent yes
  IdentitiesOnly yes
  
  # Performance
  ControlMaster auto
  ControlPath ~/.ssh/sockets/%r@%h:%p
  ControlPersist 600
