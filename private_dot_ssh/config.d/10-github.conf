# GitHub - Personal account (DanielePeruzzi97)
Host github.com
  HostName github.com
  User git
  IdentityFile ~/.ssh/id_ed25519
  IdentitiesOnly yes
  ControlPath ~/.ssh/sockets/github-personal@%h:%p

# GitHub - Work account (daniele.peruzzi@omnys.com / MDS-BD)
Host github-work
  HostName github.com
  User git
  IdentityFile ~/.ssh/id_ed25519_omnys
  IdentitiesOnly yes
  ControlPath ~/.ssh/sockets/github-work@%h:%p

# Bitbucket - Work account (daniele.peruzzi@omnys.com)
Host bitbucket.org
