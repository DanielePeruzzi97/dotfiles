# Kitty Configuration
# Migrated from Alacritty configuration to maintain identical look and feel

# Font Configuration
font_family      JetBrainsMonoNL Nerd Font
bold_font        JetBrainsMonoNL Nerd Font Bold
italic_font      JetBrainsMonoNL Nerd Font
bold_italic_font JetBrainsMonoNL Nerd Font Bold Italic
font_size 17.0

# Cursor Configuration
cursor_shape block
cursor_blink_interval 0

# Window Configuration
# Remove window decorations (equivalent to decorations = "None" in Alacritty)
hide_window_decorations yes

# Initial window size
remember_window_size no
initial_window_width  160c
initial_window_height 80c

# Window padding
window_padding_width 4
window_padding_height 4

# Placement strategy
placement_strategy center

# Start maximized
# Note: Kitty doesn't have a direct "Maximized" startup mode like Alacritty
# You can use OS window manager settings or launch with specific size

# Enable dynamic title
dynamic_background_opacity yes

# Shell
shell /bin/zsh

# Mouse Configuration
mouse_hide_wait 3.0

# Bell Configuration
enable_audio_bell no
visual_bell_duration 0.0

# Terminal type
term xterm-256color

# Color Scheme - Rose Pine
# Based on your rose-pine.toml

# Foreground and Background
foreground #e0def4
background #000000

# Cursor colors
cursor #524f67
cursor_text_color #e0def4

# Selection colors
selection_foreground #e0def4
selection_background #403d52

# Normal colors
color0 #26233a
color1 #eb6f92
color2 #31748f
color3 #f6c177
color4 #9ccfd8
color5 #c4a7e7
color6 #ebbcba
color7 #e0def4

# Bright colors
color8  #6e6a86
color9  #eb6f92
color10 #31748f
color11 #f6c177
color12 #9ccfd8
color13 #c4a7e7
color14 #ebbcba
color15 #e0def4

# Tab bar colors (if using tabs)
active_tab_foreground   #e0def4
active_tab_background   #26233a
inactive_tab_foreground #908caa
inactive_tab_background #191724

# Key Bindings
# Clear default bindings that conflict
clear_all_shortcuts no

# Clipboard operations - matching Alt+C/Alt+V from Alacritty
map alt+c copy_to_clipboard
map alt+v paste_from_clipboard

# Middle mouse button paste
mouse_map middle release ungrabbed paste_from_selection

# Quit application
map alt+q quit

# New instance
map alt+n new_os_window

# Font size adjustment (Kitty defaults, but keeping for reference)
map ctrl+shift+equal     change_font_size all +2.0
map ctrl+shift+minus     change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0

# Send escape sequences (matching the chars bindings from Alacritty)
# Alt+C sends escape sequence
# Note: In Kitty, text sending is different. These were custom in Alacritty.
# You may need to adjust based on your shell/application needs.

# Advanced Configuration
# Semantic escape characters for selection (matching Alacritty)
select_by_word_characters @-./_~?&=%+#

# Live config reload
# Kitty automatically reloads config on changes

# Enable image support (this is what you wanted to try!)
# Kitty has built-in image protocol support
# You can display images using: kitty +kitten icat image.png
