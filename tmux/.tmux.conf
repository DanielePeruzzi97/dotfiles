set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm*:Tc'
set -s escape-time 0
set -s set-clipboard on
set -g mouse on
set -g mode-keys vi
set -g extended-keys on
set-option -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1
set-option -g status-position top
set-option -g status-justify absolute-centre
set-option -g detach-on-destroy off

unbind C-b
set -g prefix M-a
bind M-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "Config reloading..."

# Window resizing (Alt+hjkl - matches nvim)
bind -n M-h resize-pane -L 2
bind -n M-l resize-pane -R 2
bind -n M-k resize-pane -U 2
bind -n M-j resize-pane -D 2
bind -n M-d kill-pane
bind -n M-H previous-window
bind -n M-L next-window

# vi-style
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

unbind %
unbind '"'
# Split horizontally (v) and vertically (h)
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# Open Lazygit in a new window
bind G neww -n "git" -S lazygit

bind -r T neww -c "#{pane_current_path}" "nvim ~/personal/todo.md"

# tmux-sessionizer bindings - consistent and self-explanatory
# Main sessionizer fuzzy finder
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Session commands (Alt+1/2/3 - matches nvim and zsh)
bind-key -r M-1 run-shell "tmux neww ~/.local/bin/tmux-sessionizer -s 0"    # htop
bind-key -r M-2 display-popup -E -w 95% -h 95% "~/.local/bin/tmux-sessionizer -s 1"  # lazygit
bind-key -r M-3 run-shell "tmux neww ~/.local/bin/tmux-sessionizer -s 2"    # opencode

# Quick directory shortcuts (prefix + key)
bind-key -r O run-shell "~/.local/bin/tmux-sessionizer ~/omnys/git"          # Omnys
bind-key -r D run-shell "~/.local/bin/tmux-sessionizer ~/.dotfiles"          # Dotfiles
bind-key -r P run-shell "~/.local/bin/tmux-sessionizer ~/.dotfiles-private"  # Private
bind-key -r C run-shell "~/.local/bin/tmux-sessionizer ~/.config"            # Config

# Theme options
set -g status-style "bg=default"
set -g status-left-length 40

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# OSC 52 clipboard passthrough (works over SSH)
set -g allow-passthrough on
set -ga terminal-overrides ",xterm*:Ms=\\E]52;c;%p2%s\\7"

# Disable arrow keys - force hjkl muscle memory (ThePrimeagen style)
# bind-key -n Up    display-message "Use k instead of Up!"
# bind-key -n Down  display-message "Use j instead of Down!"
# bind-key -n Left  display-message "Use h instead of Left!"
# bind-key -n Right display-message "Use l instead of Right!"

run '~/.tmux/plugins/tpm/tpm'
