# Hyprland plugin configuration
# This file is sourced after plugins are loaded
# It contains plugin-specific settings that would error without the plugin

# Scrolling layout (hyprsplit plugin)
scrolling {
    column_width = 1.0                    # Default: finestre a schermo intero
    fullscreen_on_one_column = true       # Single column spans entire screen
    direction = "right"
}
