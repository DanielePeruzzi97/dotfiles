# ~/.config/hypr/hypridle.conf
# Minimal config - NO auto-lock/dim, ONLY post-lock DPMS management
# Manual lock via Super+Escape (hyprlock), then screen turns off after idle

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    inhibit_sleep = 2
}

# DPMS off only when locked (checks for hyprlock process)
# Triggers 30 seconds after idle, but only acts if screen is already locked
listener {
    timeout = 30
    on-timeout = pgrep -x hyprlock && hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30min IF locked
# Prevents accidental suspend while working
listener {
    timeout = 1800
    on-timeout = pgrep -x hyprlock && systemctl suspend
}
