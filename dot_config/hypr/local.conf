# Machine-specific overrides (not tracked in git)
# Add your local customizations here

# Fix XWayland blurry rendering with fractional scaling
# Forces XWayland apps to render at native resolution (crisp but smaller)
xwayland {
    force_zero_scaling = true
}

# Compensate XWayland scaling for apps that support it
# QT_SCALE_FACTOR: VirtualBox and Qt XWayland apps
# GDK_SCALE: GTK2/GTK3 XWayland apps (HeidiSQL, etc.) - only supports integers
env = QT_SCALE_FACTOR,1.33
env = GDK_SCALE,2
