# ~/.config/hypr/hyprland.conf
# ThePrimeagen-inspired minimal config

################
### MONITORS ###
################
# Auto-detect all monitors (like Ubuntu)
# The last number is scale: 1 = 100%, 1.5 = 150%, 2 = 200%
monitor=,preferred,auto,1

# Laptop lid switch (uncomment if needed)
# bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
# bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, preferred, auto, 1"

###################
### MY PROGRAMS ###
###################
$terminal = ghostty
$fileManager = dolphin
$menu = rofi -show drun -p "Search> "

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Qt theming (Hyprland native engine for KDE apps like Dolphin)
env = QT_QPA_PLATFORMTHEME,hyprqt6engine

# GTK dark theme
env = GTK_THEME,Adwaita:dark

# Fix Dolphin MIME/file associations (needs archlinux-xdg-menu)
env = XDG_MENU_PREFIX,arch-

#################
### AUTOSTART ###
#################
exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprpolkitagent
exec-once = udiskie &
exec-once = hyprsunset -t 4500
exec-once = kbuildsycoca6

#####################
### LOOK AND FEEL ###
#####################
# ThePrimeagen style: functional with subtle aesthetics

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(ebbcbaee) rgba(c4a7e7ee) 45deg
    col.inactive_border = rgba(6e6a86aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        ignore_opacity = true
        passes = 3
        noise = 0.01
        vibrancy = 0.1696
    }
}

# Animations disabled for snappy feel (ThePrimeagen style)
animations {
    enabled = no, please :)
}

#############
### INPUT ###
#############
input {
    kb_layout = us,it
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# Touchpad gestures (move this inside input section if needed)
# gestures:workspace_swipe = false

###############
### LAYOUTS ###
###############
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

##########
### MISC ##
##########
misc {
    disable_hyprland_logo = true
    focus_on_activate = true
}

##############################
### WINDOWS AND WORKSPACES ###
##############################
# Smart gaps disabled - keeps gaps/borders even with single window
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]

# Ignore maximize requests from apps
windowrule = suppressevent maximize, class:.*

# Fix XWayland dragging issues
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# Keyboard layout switch (us/it)
bind = $mainMod, space, exec, hyprctl switchxkblayout current next

# Essential binds
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, F, fullscreen,
bind = $mainMod, M, movecurrentworkspacetomonitor, +1

# Lock screen
bind = $mainMod, Escape, exec, hyprlock

# Power menu (wlogout)
bind = $mainMod SHIFT, Q, exec, wlogout -b 2

# Restart waybar
bind = $mainMod, W, exec, pkill waybar && waybar &

# Screenshot binds
bind = $mainMod, S, exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = $mainMod SHIFT, S, exec, hyprshot -m window -o ~/Pictures/Screenshots
bind = , Print, exec, hyprshot -m output -o ~/Pictures/Screenshots

# Clipboard history
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Move focus (vim keys)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Toggle split direction
bind = $mainMod SHIFT, T, togglesplit,

# Resize windows
bind = $mainMod CTRL, H, resizeactive, -50 0
bind = $mainMod CTRL, L, resizeactive, 50 0
bind = $mainMod CTRL, K, resizeactive, 0 -50
bind = $mainMod CTRL, J, resizeactive, 0 50

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Zoom (cursor zoom)
bind = $mainMod, equal, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | grep float | awk '{print $2 + 0.5}')
bind = $mainMod, minus, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | grep float | awk '{if ($2 - 0.5 < 1) print 1; else print $2 - 0.5}')
bind = $mainMod, 0, exec, hyprctl keyword cursor:zoom_factor 1

# Audio
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness (laptop)
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Media controls
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
