# Rose Pine colorscheme
# Base colors (for reference in other configs)
# $rp_base = 191724
# $rp_surface = 1f1d2e
# $rp_overlay = 26233a
# $rp_muted = 6e6a86
# $rp_subtle = 908caa
# $rp_text = e0def4
# $rp_love = eb6f92
# $rp_gold = f6c177
# $rp_rose = ebbcba
# $rp_pine = 31748f
# $rp_foam = 9ccfd8
# $rp_iris = c4a7e7

# ENV vars
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Qt theming
env = QT_QPA_PLATFORMTHEME,qt5ct

# GTK theming - libadwaita uses portal/gsettings, NOT env vars
# Do NOT set GTK_THEME or ADW_DISABLE_PORTAL - it breaks libadwaita apps

# Wayland-specific (from HyprYou best practices)
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Electron/Firefox Wayland support
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = MOZ_ENABLE_WAYLAND,1

# GTK input method - required for dead keys/compose to work in GTK4 apps
env = GTK_IM_MODULE,simple

# Look and feel
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2

    # Rose Pine gradient: rose → iris
    col.active_border = rgba(ebbcbaee) rgba(c4a7e7ee) 45deg
    col.inactive_border = rgba(6e6a86aa)

    resize_on_border = false
    allow_tearing = true  # Enable for gaming (use windowrule to activate per-app)
    layout = scrolling
}

# Decoration - Primeagen minimal style (no blur, no shadows)
decoration {
    rounding = 8
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

# Animations - fast and minimal
animations {
    enabled = true

    bezier = quick, 0.25, 0.1, 0.25, 1

    animation = windows, 1, 2, quick, slide
    animation = windowsOut, 1, 2, quick, popin 80%
    animation = border, 1, 3, quick
    animation = fade, 1, 2, quick
    animation = workspaces, 1, 2, quick, slide
}

# Input (moved from keybinds.conf for proper organization)
input {
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# Layouts
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

scrolling {
    column_width = 1.0                    # Default: finestre a schermo intero
    fullscreen_on_one_column = true       # Single column spans entire screen
}

# Misc - performance optimizations
misc {
    disable_hyprland_logo = true
    focus_on_activate = true
    mouse_move_enables_dpms = true      # Wake on mouse move
    key_press_enables_dpms = true       # Wake on key press
    vfr = true                          # Variable frame rate - saves power when idle
    vrr = 1                             # Variable refresh rate if monitor supports
}
